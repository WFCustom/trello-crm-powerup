<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { padding: 20px 28px 60px; max-width: 1100px; margin: 0 auto; }
    .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; position: sticky; top: 0; background: #fff; padding: 6px 0; }
    .toolbar input { flex: 1; padding: 8px 10px; border: 1px solid #dfe1e6; border-radius: 3px; font-size: 14px; }
    .stage-heading { font-size: 15px; font-weight: 600; margin: 22px 0 8px; color: #172b4d; }
    .job-row {
      display: flex; align-items: center; gap: 12px; padding: 10px 12px;
      border: 1px solid #dfe1e6; border-radius: 6px; margin-bottom: 8px; flex-wrap: wrap;
    }
    .job-name { flex: 1 1 260px; font-weight: 600; }
    .job-name a { color: #172b4d; text-decoration: none; }
    .job-name a:hover { text-decoration: underline; }
    .job-status { flex: 0 0 auto; font-size: 12px; color: #5e6c84; min-width: 200px; }
    .job-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .job-actions button { margin: 0; padding: 6px 12px; font-size: 13px; }
    button.secondary {
      background: #fff; color: #172b4d; border: 1px solid #dfe1e6;
      border-radius: 3px; padding: 6px 12px; font-size: 13px; cursor: pointer;
    }
    button.secondary:hover { background: #f4f5f7; }
    select.inline-select { padding: 6px; border: 1px solid #dfe1e6; border-radius: 3px; font-size: 13px; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .pill.gray { background: #f4f5f7; color: #5e6c84; }
    .pill.amber { background: #fff0b3; color: #7f5f01; }
    .pill.green { background: #baf3db; color: #164b35; }
    .pill.red { background: #ffd5d2; color: #ae2e24; }
    .error { color: #c9372c; font-size: 13px; margin-top: 4px; }
    .empty { color: #5e6c84; font-size: 13px; padding: 10px 0; }
  </style>
</head>
<body>
  <div id="content" class="loading">Loading work…</div>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="../config.js"></script>
  <script src="../lib/stage.js"></script>
  <script src="../lib/trello-rest.js"></script>
  <script src="../lib/phase.js"></script>
  <script src="../lib/roster.js"></script>
  <script src="./workboard.js"></script>
</body>
</html>
